{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>

    {% block meta %} {% endblock meta %}
</head>
<body style="
    background-color: {{theme.color|default:'#ffffff'}};
    font-family: {{theme.font|default:'Arial'}};
">
    <div class="max-w-5xl mx-auto px-4 py-6">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
