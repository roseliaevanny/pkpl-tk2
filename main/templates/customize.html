<style>
    .customize-card {
        max-width: 400px;
        margin: 2rem auto;
        padding: 2rem;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        border: 1px solid #100000;
    }

    .customize-card h2 {
        margin-top: 0;
        margin-bottom: 1.5rem;
        font-size: 1.5rem;
        color: #1f2937;
        text-align: center;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: #4b5563;
        font-size: 0.9rem;
    }

    .color-picker-wrapper {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    input[type="color"] {
        -webkit-appearance: none;
        border: none;
        width: 40px;
        height: 40px;
        cursor: pointer;
        background: none;
    }

    input[type="color"]::-webkit-color-swatch {
        border-radius: 8px;
        border: 2px solid #e5e7eb;
    }

    select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        background-color: #f9fafb;
        color: #1f2937;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
    }

    select:focus {
        border-color: #2563eb;
        ring: 2px solid #2563eb;
    }

    .btn-apply {
        width: 100%;
        padding: 12px;
        background-color: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-apply:hover {
        background-color: #1d4ed8;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .btn-apply:active {
        transform: translateY(0);
    }
</style>

<div class="customize-card">
    <h2>Customize Appearance</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="color">Theme Color</label>
            <div class="color-picker-wrapper">
                <input type="color" id="color" name="color" value="{{ theme.color|default:'#ffffff' }}">
                <span style="color: #6b7280; font-size: 0.85rem;">Click to change color</span>
            </div>
        </div>

        <div class="form-group">
            <label for="font">Choose Font</label>
            <select name="font" id="font">
                <option value="Arial" {% if theme.font == 'Arial' %}selected{% endif %}>Arial</option>
                <option value="Times New Roman" {% if theme.font == 'Times New Roman' %}selected{% endif %}>Times New
                    Roman</option>
                <option value="Courier New" {% if theme.font == 'Courier New' %}selected{% endif %}>Courier New</option>
                <option value="Verdana" {% if theme.font == 'Verdana' %}selected{% endif %}>Verdana</option>
            </select>
        </div>

        <button type="submit" class="btn-apply">Apply Changes</button>
    </form>
</div>
